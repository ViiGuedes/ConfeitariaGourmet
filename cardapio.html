<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Confeitaria Gourmet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="div-navbar">
    <div class="logo">
      <img class="logo" src="imagens/sublogo.PNG" alt="" />
    </div>

  <div class="botoes">
    <a href="faleconosco.html"><button class="btn">FALE CONOSCO</button></a>
    <a href="index.html"><button>PÁGINA INICIAL</button></a>
  </div>
</header>

<main class="container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>Categorias</h2>
    <ul>
      <li>Cupcakes</li>
      <li>Dunuts</li>
      <li>Morangos do Amor</li>
      <li>Rocamboles</li>
      <li>Docinhos</li>
      <li>Macarrons</li>
    </ul>
  </aside>

  <!-- Conteúdo -->
  <section class="conteudo">
    <h1>Cardápio</h1>

    <input type="text" placeholder="Pesquisar..." class="busca">

    <div class="grid">

      <div class="card">
        <img src="imagens/rocambole.jpg">
        <p>Rocamboles<br><span>R$ 50,00</span></p>
      </div>

      <div class="card">
        <img src="imagens/docinhos.jpg">
        <p>Docinhos<br><span>R$ 10,00</span></p>
      </div>

      <div class="card">
        <img src="imagens/macarrons.jpg">
        <p>Macarrons<br><span>R$ 15,00</span></p>
      </div>

      <div class="card">
        <img src="imagens/images.jpg">
        <p>Brigadeiro do Amor<br><span>R$ 20,00</span></p>
      </div>

      <div class="card">
        <img src="imagens/cupcakes.jpg">
        <p>Cupcakes<br><span>R$ 25,00</span></p>
      </div>

      <div class="card">
        <img src="imagens/dunats.jpg">
        <p>Donuts<br><span>R$ 30,00</span></p>
      </div>

    </div>
  </section>

</main>

</body>
</html>
